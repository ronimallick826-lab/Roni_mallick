<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RM Jewellery Laser Shoulder - Review Us</title>
    <!-- Google Fonts for premium typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo-placeholder {
            font-size: 50px;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 22px;
            color: #2d3436;
            margin-bottom: 2px;
            font-weight: 700;
        }
        h2 {
            font-size: 18px;
            color: #0984e3;
            margin-bottom: 15px;
            font-weight: 600;
        }
        p.tagline {
            font-size: 14px;
            color: #636e72;
            margin-bottom: 25px;
        }
        .stars {
            font-size: 30px;
            color: #fdcb6e;
            margin-bottom: 25px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .review-btn {
            display: inline-block;
            background: #ff7675;
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(255, 118, 117, 0.4);
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 25px;
            text-transform: uppercase;
        }
        .review-btn:hover {
            background: #d63031;
            transform: scale(1.03);
        }
        .footer-text {
            font-size: 13px;
            color: #b2bec3;
            border-top: 1px solid #dfe6e9;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ज्वेलरी शॉप के लिए सुंदर चमकते सितारे और डायमंड इमोजी -->
        <div class="logo-placeholder">✨💎✨</div> 
        
        <!-- आपकी दुकान का नाम -->
        <h1>RM Jewellery Laser Shoulder</h1> 
        <h2>आर एम लेझर सोल्डर</h2>
        
        <p class="tagline">हमारे साथ अपना अनुभव शेयर करें!</p>
        
        <!-- फाइव स्टार एनिमेशन -->
        <div class="stars">
            <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
        </div>

        <!-- आपका डायरेक्ट गूगल रिव्यू लिंक यहाँ सेट कर दिया गया है -->
        <a href="https://search.google.com/local/writereview?placeid=ChIJo9obcxRVxDsRTqpyCcBpAks" class="review-btn" target="_blank">
            हमें Google पर Review दें
        </a>

        <div class="footer-text">
            हमारी दुकान पर आने के लिए आपका बहुत-बहुत धन्यवाद! 🙏
        </div>
    </div>

</body>
</html>
